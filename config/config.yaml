# Emotion Concepts Replication Configuration
# Default model: Qwen/Qwen3-32B  (bfloat16, no quantization)
#   Architecture: 64 layers, hidden_size=5120, GQA (64 heads / 8 kv-heads)
#   VRAM: ~65 GB in bfloat16 → 2× A100-80G or H100-80G recommended

model:
  # HuggingFace model for activation extraction (requires HF backend + GPU)
  # Qwen3-32B has no separate instruct variant — the base model is instruction-tuned
  hf_model_name: "Qwen/Qwen3-32B"
  # Device used when running on a single GPU (ignored when hf_gpu_ids is set)
  device: "cuda:0"
  # bfloat16 is the official dtype for Qwen3 on Ampere/Hopper GPUs
  dtype: "bfloat16"

  # Multi-GPU model pool: one complete model replica per listed GPU.
  # Qwen3-32B at bfloat16 uses ~65 GB; each H200 (141 GB) holds one copy
  # with plenty of headroom for activations.
  # Set to null to use a single GPU (device above).
  # Set to a list of GPU IDs to enable the pool, e.g. [0,1,2,3,4,5,6,7]
  hf_gpu_ids: [0, 1, 2, 3, 4, 5, 6, 7]

  # Ollama backend (fast local inference, no activation access)
  ollama_host: "http://localhost:11434"
  ollama_model: "qwen3:32b"

  # OpenAI-compatible API (vLLM server, SGLang server, etc.)
  openai_base_url: "http://localhost:8000/v1"
  openai_model: "Qwen/Qwen3-32B"
  openai_api_key: "not-needed"

  # vLLM in-process backend (~65 GB bfloat16 → set tp to match your GPU count)
  # Launch example: vllm serve Qwen/Qwen3-32B --tensor-parallel-size 2 --dtype bfloat16
  vllm_model: "Qwen/Qwen3-32B"
  vllm_tensor_parallel_size: 2
  vllm_gpu_memory_utilization: 0.92
  vllm_dtype: "bfloat16"

  # SGLang in-process backend
  # Launch example: python -m sglang.launch_server --model-path Qwen/Qwen3-32B \
  #                   --tp 2 --dtype bfloat16 --port 30000
  sglang_model: "Qwen/Qwen3-32B"
  sglang_tp_size: 2
  sglang_mem_fraction_static: 0.90
  sglang_dtype: "bfloat16"
  sglang_port: 30000

  # SGLang server mode (point to a running SGLang server)
  sglang_server_url: "http://localhost:30000"

concurrency:
  # Batch size / max parallel workers for generate_concurrent().
  # vLLM / SGLang: ignored (they self-tune internally).
  # HuggingFace: mini-batch size for batched generation (keep low for 32B, e.g. 4-8).
  # Ollama / OpenAI-compat: thread-pool size.
  max_concurrent: 32

emotion_vectors:
  # Number of stories to generate per emotion word
  stories_per_emotion: 20
  # Number of neutral/control stories
  neutral_stories: 50
  # Layers to extract activations from.
  # null = all 64 layers (safest default; gives maximum flexibility at analysis time).
  # To target higher layers only (saves memory & extraction time), use an explicit list:
  #   target_layers: [32, 36, 40, 44, 48, 52, 56, 60, 63]  # upper half of Qwen3-32B
  #   target_layers: [48, 52, 56, 60, 63]                   # top quarter only
  target_layers: null
  # Token aggregation strategy: "last", "mean"
  aggregation: "mean"
  # Where to save extracted vectors
  output_dir: "results/emotion_vectors"
  # Where to save generated stories as JSONL (null = do not save)
  stories_dir: "results/stories"

generation:
  # Max tokens per story — 4096 ensures complete stories for a 32B model
  max_new_tokens: 4096
  temperature: 0.7      # Qwen3 recommended: 0.7 for non-thinking, 0.6 for thinking
  top_p: 0.8            # Qwen3 recommended: 0.8 (non-thinking) / 0.95 (thinking)
  top_k: 20             # Qwen3 recommended: 20
  do_sample: true
  # Qwen3-32B supports a thinking mode (<think>...</think> blocks before the answer).
  # Disable for story generation (faster, no reasoning overhead needed).
  # Enable for math/reasoning tasks like AIME evaluation.
  enable_thinking: false
  # Story generation prompt templates
  story_prompt_template: "Write a short story (2-3 paragraphs) about a character who is feeling {emotion}. Focus on how this emotion affects their thoughts, actions, and interactions."
  neutral_prompt_template: "Write a short story (2-3 paragraphs) about a character going about their ordinary daily routine. Keep the tone neutral and matter-of-fact."

validation:
  test_corpus_size: 100
  sensitivity_test: true
  output_dir: "results/validation"

preference_analysis:
  alpha_values: [-2.0, -1.0, 0.0, 1.0, 2.0]
  steering_layer: -1    # -1 = last third of network (~layer 43 for Qwen3-32B)
  output_dir: "results/preference"

behavioral_eval:
  num_trials: 20
  scenarios:
    - "blackmail"
    - "reward_hacking"
  output_dir: "results/behavioral"

steering:
  # Layers to apply emotion steering.
  # Qwen3-32B has 64 layers (indices 0-63).
  # Research consistently shows the upper half (~layer 40+) carries richer semantics.
  steering_layers: [32, 38, 42, 46, 50, 54, 58, 62]
  alpha_values: [-3.0, -2.0, -1.0, 0.0, 1.0, 2.0, 3.0]
  output_dir: "results/steering"
